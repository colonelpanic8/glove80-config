syntax = "proto3";

package zmk.host_lighting;

message Request {
    oneof request_type {
        bool get_capabilities = 1;
        SetPixelsRequest set_pixels = 2;
        bool clear = 3;
        SetEffectsRequest set_effects = 4;
    }
}

message Response {
    oneof response_type {
        Capabilities get_capabilities = 1;
        ApplyResult set_pixels = 2;
        ApplyResult clear = 3;
        ApplyResult set_effects = 4;
    }
}

message Pixel {
    uint32 index = 1;
    uint32 rgb = 2;
}

message SetPixelsRequest {
    repeated Pixel pixels = 1;
    bool replace = 2;
    uint32 timeout_ms = 3;
}

enum EffectType {
    EFFECT_TYPE_STATIC = 0;
    EFFECT_TYPE_BLINK = 1;
    EFFECT_TYPE_BREATHE = 2;
}

message Effect {
    uint32 index = 1;
    uint32 rgb = 2;
    EffectType type = 3;
    uint32 period_ms = 4;
    uint32 phase_ms = 5;
    uint32 duty_percent = 6;
}

message SetEffectsRequest {
    repeated Effect effects = 1;
    bool replace = 2;
    uint32 timeout_ms = 3;
}

message Capabilities {
    uint32 protocol_version = 1;
    uint32 pixel_count = 2;
    uint32 pixels_per_half = 3;
    uint32 max_updates_per_request = 4;
    uint32 max_update_hz = 5;
    uint32 default_timeout_ms = 6;
    uint32 max_timeout_ms = 7;
    uint32 max_channel_value = 8;
    bool supports_replace = 9;
    bool supports_split = 10;
    bool supports_effects = 11;
    uint32 min_effect_period_ms = 12;
    uint32 max_effect_period_ms = 13;
    uint32 effect_time_quantum_ms = 14;
}

enum ApplyResult {
    APPLY_RESULT_OK = 0;
    APPLY_RESULT_INVALID_PIXEL = 1;
    APPLY_RESULT_PARTIAL = 2;
    APPLY_RESULT_PERIPHERAL_UNAVAILABLE = 3;
    APPLY_RESULT_INTERNAL_ERROR = 4;
    APPLY_RESULT_INVALID_EFFECT = 5;
}
