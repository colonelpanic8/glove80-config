name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
      - name: Generate keymap
        run: nix run .#generate-keymap
      - name: Check generated keymap is committed
        run: git diff --exit-code -- config/glove80.keymap
      - name: Build combined Glove80 firmware
        run: nix build .#firmware
      - name: Copy result
        run: cp result/glove80.uf2 glove80.uf2
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: glove80.uf2
          path: glove80.uf2
